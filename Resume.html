<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ahvner Vazquez · Resume.3D</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="styles.css" />

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
</head>
<body class="dark pal-teal layout-spatial">
  <canvas id="bg-canvas"></canvas>
  <div id="ui-root"></div>

  <!-- React -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Content + UI -->
  <script src="content.js"></script>
  <script type="text/babel" data-presets="react" src="ui.jsx"></script>

  <!-- Boot -->
  <script type="module">
    import { initScene, flyTo, setPalette, setDark } from './scene.js';

    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "palette": "mono",
      "dark": true,
      "layout": "panel",
      "hero": "ico"
    }/*EDITMODE-END*/;

    const tweakState = { ...TWEAK_DEFAULTS };

    const applyBodyClasses = () => {
      const b = document.body;
      b.classList.toggle('dark', tweakState.dark);
      b.classList.toggle('light', !tweakState.dark);
      b.classList.remove('pal-teal','pal-navy','pal-mono','pal-purple');
      b.classList.add('pal-' + tweakState.palette);
      b.classList.remove('layout-spatial','layout-panel','layout-immersive');
      b.classList.add('layout-' + tweakState.layout);
    };
    applyBodyClasses();

    // Init scene
    const canvas = document.getElementById('bg-canvas');
    initScene(canvas, {
      palette: tweakState.palette,
      dark: tweakState.dark,
      onSectionClick: (id) => { if (window.__onSectionClick) window.__onSectionClick(id); },
    });
    window.__flyTo = flyTo;

    // Boot React once Babel has transpiled ui.jsx
    const bootReact = () => {
      if (!window.ResumeApp) return setTimeout(bootReact, 50);
      const root = ReactDOM.createRoot(document.getElementById('ui-root'));
      const onTweak = (patch) => {
        Object.assign(tweakState, patch);
        applyBodyClasses();
        if (patch.palette) setPalette(patch.palette);
        if (patch.dark !== undefined) setDark(patch.dark);
        render();
        // persist
        window.parent.postMessage({ type: '__edit_mode_set_keys', edits: patch }, '*');
      };
      const render = () => root.render(React.createElement(window.ResumeApp, { tweaks: tweakState, onTweak }));
      render();
    };
    bootReact();
  </script>
</body>
</html>
